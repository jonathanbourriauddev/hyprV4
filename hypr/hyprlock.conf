general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = ~/Images/shaded-tardis.png   # Ton fond d'écran
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2 # 0 pour voir le Tardis net, 2 pour un effet flou sympa
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(ed94c1) # Mauve Macchiato
    inner_color = rgb(24273a) # Base Macchiato
    font_color = rgb(cad3f5) # Texte
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(cad3f5)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
